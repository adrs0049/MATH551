name: build-and-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BASE_URL: /${{ github.event.repository.name }}
  NODE_OPTIONS: '--max-old-space-size=12288'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ── Job 1a: Execute notebooks ───────────────────────────────────────
  execute-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Cache executed notebooks
      uses: actions/cache@v4
      id: nb-cache
      with:
        path: notebooks/
        key: notebooks-${{ hashFiles('notebooks/**/*.ipynb', 'requirements.txt') }}

    - name: Set up Python
      if: steps.nb-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements-notebooks.txt

    - name: Execute notebooks
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: bash scripts/execute-notebooks.sh

    - name: Populate MyST execution cache from executed notebooks
      run: python3 scripts/populate-execute-cache.py

    - name: Upload executed notebooks
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/
        retention-days: 1

    - name: Upload execution cache
      uses: actions/upload-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/
        retention-days: 1

  # ── Job 1b: Build myst-theme (runs in parallel with notebooks) ──────
  build-theme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: myst-theme/package-lock.json

    - name: Build myst-theme
      run: |
        cd myst-theme
        npm ci
        npm run build
        cd themes/book
        npm run prod:build

    - name: Upload built theme
      uses: actions/upload-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/
        retention-days: 1

  # ── Job 2: Build PDFs (needs notebooks + theme) ─────────────────────
  build-pdfs:
    needs: [execute-notebooks, build-theme]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download execution cache
      uses: actions/download-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    - name: Cache PDF exports
      uses: actions/cache@v4
      id: pdf-cache
      with:
        path: |
          exports/
          */exports/
        key: pdfs-${{ hashFiles('**/*.md', 'myst.yml', '_templates/**', 'notebooks/**/*.ipynb') }}

    - name: Set up Python
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements.txt

    - name: Patch mystmd for algorithm/property environments
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: bash scripts/patch-mystmd.sh

    - name: Install LaTeX
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-science texlive-xetex latexmk librsvg2-bin

    - name: Build PDFs
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      timeout-minutes: 20
      env:
        JUPYTER_EXECUTION_TIMEOUT: '120'
      run: |
        # MyST's node process sometimes hangs after completing all exports.
        # Redirect to file (not pipe/tee) so we can kill cleanly.
        jupyter-book build --execute --pdf > /tmp/pdf-build.log 2>&1 &
        BUILD_PID=$!
        LAST_COUNT=0
        STABLE_SINCE=0
        while kill -0 $BUILD_PID 2>/dev/null; do
          COUNT=$(grep -c "Exported PDF" /tmp/pdf-build.log 2>/dev/null || true)
          COUNT=${COUNT:-0}
          if [ "$COUNT" -gt 0 ] && [ "$COUNT" -eq "$LAST_COUNT" ]; then
            STABLE_SINCE=$((STABLE_SINCE + 1))
          else
            STABLE_SINCE=0
            LAST_COUNT=$COUNT
          fi
          # If no new PDF exported for 60s, all exports are done and process is hanging
          if [ "$STABLE_SINCE" -ge 60 ]; then
            echo "All $COUNT PDFs exported, process still running after 60s."
            # Step 1: kill the Jupyter kernel, which is likely what's blocking Node
            echo "Killing Python/Jupyter kernel processes..."
            pkill -9 -f "ipykernel" 2>/dev/null || true
            pkill -9 -f "jupyter" 2>/dev/null || true
            # Step 2: give Node 15s to notice the kernel is gone and exit
            for j in $(seq 1 15); do
              if ! kill -0 $BUILD_PID 2>/dev/null; then break; fi
              sleep 1
            done
            # Step 3: if Node is still alive, force kill it
            if kill -0 $BUILD_PID 2>/dev/null; then
              echo "Node still running, force killing."
              kill -9 $BUILD_PID 2>/dev/null || true
            fi
            break
          fi
          sleep 1
        done
        wait $BUILD_PID 2>/dev/null || true
        cat /tmp/pdf-build.log
        exit 0

    - name: Upload PDF exports
      uses: actions/upload-artifact@v4
      with:
        name: pdf-exports
        path: |
          exports/
          */exports/
        retention-days: 1

  # ── Job 3: Build HTML + Deploy (needs notebooks + theme + PDFs) ─────
  build-html-deploy:
    needs: [execute-notebooks, build-theme, build-pdfs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download execution cache
      uses: actions/download-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    - name: Download PDF exports
      uses: actions/download-artifact@v4
      with:
        name: pdf-exports
        path: .

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Patch mystmd for algorithm/property environments
      run: bash scripts/patch-mystmd.sh

    # Memory monitoring for debugging OOM issues
    - name: Start memory monitor
      run: |
        echo "=== Runner memory ==="
        free -h
        echo ""
        while true; do
          echo "$(date -u +%H:%M:%S) $(free -m | awk '/Mem:/{printf "used=%sMB free=%sMB available=%sMB", $3, $4, $7}')"
          sleep 10
        done > /tmp/memlog.txt &
        echo $! > /tmp/memmon.pid

    - name: Verify execution cache
      run: python3 scripts/verify-execute-cache.py

    - name: Verify cache in build job
      run: |
        echo "Cache files: $(ls _build/execute/ 2>/dev/null | wc -l)"
        python3 scripts/verify-execute-cache.py

    - name: Build the book
      timeout-minutes: 45
      run: |
        # MyST hangs after build completes (kernel stays alive).
        # Strategy: watch _build/html for new files; when no new HTML appears
        # for a while AND we have a reasonable number of pages, kill the hang.
        # stdbuf forces line-buffering so progress is visible in real time
        # rather than dumped at process exit.
        stdbuf -oL -eL jupyter-book build --execute --execute-parallel 1 --max-size-webp 0 --html > /tmp/html-build.log 2>&1 &
        BUILD_PID=$!
        LAST_COUNT=0
        STABLE_SINCE=0
        while kill -0 $BUILD_PID 2>/dev/null; do
          COUNT=$(find _build/html -name "*.html" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq "$LAST_COUNT" ]; then
            STABLE_SINCE=$((STABLE_SINCE + 1))
          else
            STABLE_SINCE=0
            LAST_COUNT=$COUNT
          fi
          # If no new HTML files for 300s and we have a sensible number, the
          # server is hung post-build. Require at least 50 HTML files so we
          # don't kill a build that just hasn't started writing yet.
          if [ "$STABLE_SINCE" -ge 300 ] && [ "$COUNT" -ge 50 ]; then
            echo "No new HTML for 300s. Found $COUNT HTML files. Killing hung process."
            pkill -9 -f "ipykernel" 2>/dev/null || true
            pkill -9 -f "jupyter" 2>/dev/null || true
            for j in $(seq 1 15); do
              if ! kill -0 $BUILD_PID 2>/dev/null; then break; fi
              sleep 1
            done
            if kill -0 $BUILD_PID 2>/dev/null; then
              kill -9 $BUILD_PID 2>/dev/null || true
            fi
            break
          fi
          sleep 1
        done
        wait $BUILD_PID 2>/dev/null || true
        cat /tmp/html-build.log
        exit 0

    - name: Stop memory monitor and print log
      if: always()
      run: |
        kill $(cat /tmp/memmon.pid 2>/dev/null) 2>/dev/null || true
        echo "=== Memory usage over time ==="
        cat /tmp/memlog.txt 2>/dev/null || echo "No memory log found"
        echo ""
        echo "=== Final memory state ==="
        free -h

    - name: Upload memory log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: memory-log
        path: /tmp/memlog.txt
        retention-days: 3
        if-no-files-found: ignore

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './_build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
