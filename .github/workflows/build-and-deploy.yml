name: build-and-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BASE_URL: /${{ github.event.repository.name }}
  NODE_OPTIONS: '--max-old-space-size=12288'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ── Job 1a: Execute notebooks ───────────────────────────────────────
  execute-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    # Cache key covers notebooks/ AND every .md with code-cells: if a .md
    # notebook's code changes, mystmd's cache key changes too, so we must
    # re-execute. Otherwise mystmd would miss cache and execute live during
    # the HTML build, where the broken executionSemaphore (hardcoded to
    # cpus()-1, ignoring --execute-parallel) plus a hung kernel deadlocks
    # the entire 45-min build step.
    - name: Cache executed notebooks
      uses: actions/cache@v4
      id: nb-cache
      with:
        path: |
          notebooks/
          _build/execute/
        key: notebooks-${{ hashFiles('notebooks/**/*.ipynb', '**/*.md', 'requirements.txt', 'requirements-notebooks.txt') }}

    - name: Set up Python
      if: steps.nb-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements-notebooks.txt

    - name: Execute .ipynb notebooks
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: bash scripts/execute-notebooks.sh

    - name: Populate MyST execution cache from executed .ipynb files
      run: python3 scripts/populate-execute-cache.py

    # Pre-execute .md notebooks (MyST markdown with {code-cell} blocks) so
    # the HTML-build job hits cache for ALL notebooks. We use nbclient
    # directly here (one notebook at a time, per-notebook timeout) to dodge
    # mystmd's flaky kernel manager.
    - name: Pre-execute .md notebooks
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: python3 scripts/precache-md-notebooks.py --timeout 300

    - name: Upload executed notebooks
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/
        retention-days: 1

    - name: Upload execution cache
      uses: actions/upload-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/
        retention-days: 1

  # ── Job 1b: Build myst-theme (runs in parallel with notebooks) ──────
  build-theme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: myst-theme/package-lock.json

    - name: Build myst-theme
      run: |
        cd myst-theme
        npm ci
        npm run build
        cd themes/book
        npm run prod:build

    - name: Upload built theme
      uses: actions/upload-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/
        retention-days: 1

  # ── Job 2: Build PDFs (needs notebooks + theme) ─────────────────────
  build-pdfs:
    needs: [execute-notebooks, build-theme]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download execution cache
      uses: actions/download-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    - name: Cache PDF exports
      uses: actions/cache@v4
      id: pdf-cache
      with:
        path: |
          exports/
          */exports/
        key: pdfs-${{ hashFiles('**/*.md', 'myst.yml', '_templates/**', 'notebooks/**/*.ipynb') }}

    - name: Set up Python
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements.txt

    - name: Patch mystmd for algorithm/property environments
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: bash scripts/patch-mystmd.sh

    - name: Install LaTeX
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-science texlive-xetex latexmk librsvg2-bin

    - name: Build PDFs
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      timeout-minutes: 20
      env:
        JUPYTER_EXECUTION_TIMEOUT: '120'
      run: |
        # MyST's node process sometimes hangs after completing all exports.
        # Redirect to file (not pipe/tee) so we can kill cleanly.
        jupyter-book build --execute --pdf > /tmp/pdf-build.log 2>&1 &
        BUILD_PID=$!
        LAST_COUNT=0
        STABLE_SINCE=0
        while kill -0 $BUILD_PID 2>/dev/null; do
          COUNT=$(grep -c "Exported PDF" /tmp/pdf-build.log 2>/dev/null || true)
          COUNT=${COUNT:-0}
          if [ "$COUNT" -gt 0 ] && [ "$COUNT" -eq "$LAST_COUNT" ]; then
            STABLE_SINCE=$((STABLE_SINCE + 1))
          else
            STABLE_SINCE=0
            LAST_COUNT=$COUNT
          fi
          # If no new PDF exported for 240s, all exports are done and process is hanging
          if [ "$STABLE_SINCE" -ge 240 ]; then
            echo "All $COUNT PDFs exported, process still running after 240s."
            # Step 1: kill the Jupyter kernel, which is likely what's blocking Node
            echo "Killing Python/Jupyter kernel processes..."
            pkill -9 -f "ipykernel" 2>/dev/null || true
            pkill -9 -f "jupyter" 2>/dev/null || true
            # Step 2: give Node 15s to notice the kernel is gone and exit
            for j in $(seq 1 15); do
              if ! kill -0 $BUILD_PID 2>/dev/null; then break; fi
              sleep 1
            done
            # Step 3: if Node is still alive, force kill it
            if kill -0 $BUILD_PID 2>/dev/null; then
              echo "Node still running, force killing."
              kill -9 $BUILD_PID 2>/dev/null || true
            fi
            break
          fi
          sleep 1
        done
        wait $BUILD_PID 2>/dev/null || true
        cat /tmp/pdf-build.log
        exit 0

    - name: Upload PDF exports
      uses: actions/upload-artifact@v4
      with:
        name: pdf-exports
        path: |
          exports/
          */exports/
        retention-days: 1

  # ── Job 3: Build HTML + Deploy (needs notebooks + theme + PDFs) ─────
  build-html-deploy:
    needs: [execute-notebooks, build-theme, build-pdfs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download execution cache
      uses: actions/download-artifact@v4
      with:
        name: execute-cache
        path: _build/execute/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    # Swap the theme's `start` script so mystmd serves the already-built
    # prod bundle via remix-serve instead of relaunching `remix dev`.
    # Reasons:
    #   1. Memory: the dev app server keeps every route module loaded for
    #      HMR, growing past the runner's 12GB Node heap around page 50.
    #      remix-serve doesn't accumulate that bookkeeping and finishes
    #      the run without OOMing.
    #   2. Hashes: dev rebuilds with new content hashes each launch, so
    #      the HTML mystmd renders references hashes that differ from the
    #      ones in our pre-build snapshot. Self-heal then restores the
    #      "wrong" hashes and every asset 404s on the live site. The prod
    #      bundle's hashes match the snapshot exactly.
    # Local `jupyter-book start --execute` is unaffected — it doesn't run
    # this workflow; users still get `remix dev` from the unmodified
    # submodule.
    - name: Use prod remix-serve for HTML build
      run: |
        cd myst-theme/themes/book
        # Sanity-check the prod build is actually present.
        if [ ! -f build/index.js ]; then
          echo "::error::myst-theme/themes/book/build/index.js missing — prod:build did not run in build-theme job"
          exit 1
        fi
        # Replace the start script with one that runs remix-serve against the prod bundle.
        python3 - <<'PY'
        import json, pathlib
        p = pathlib.Path("package.json")
        pkg = json.loads(p.read_text())
        pkg["scripts"]["start"] = "node ../../node_modules/@remix-run/serve/dist/cli.js build/index.js"
        p.write_text(json.dumps(pkg, indent=2) + "\n")
        print("start script:", pkg["scripts"]["start"])
        PY

    # Snapshot the entire theme `public/` directory before mystmd starts.
    # In jupyter-book 2.1.5, buildHtml awaits appServer.stop() before its
    # final copySync, which lets the Remix dev server fully clean up its
    # build outputs first — copySync then ENOENTs on
    # myst-theme/themes/book/public/build/_assets/<hash>.{svg,css}.
    # (2.1.4 fired the stop unawaited, so the copy raced ahead before the
    # cleanup deleted anything.) The self-heal step at the end of this job
    # finishes the copy from this snapshot when that happens.
    - name: Snapshot theme public dir
      run: |
        if [ -d myst-theme/themes/book/public ]; then
          cp -r myst-theme/themes/book/public /tmp/theme-public-snapshot
          echo "Snapshot: $(find /tmp/theme-public-snapshot -type f | wc -l) files, $(du -sh /tmp/theme-public-snapshot | cut -f1)"
        else
          echo "::warning::No theme public directory to snapshot"
        fi

    - name: Download PDF exports
      uses: actions/download-artifact@v4
      with:
        name: pdf-exports
        path: .

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Patch mystmd for algorithm/property environments
      run: bash scripts/patch-mystmd.sh

    # Memory monitoring for debugging OOM issues
    - name: Start memory monitor
      run: |
        echo "=== Runner memory ==="
        free -h
        echo ""
        while true; do
          echo "$(date -u +%H:%M:%S) $(free -m | awk '/Mem:/{printf "used=%sMB free=%sMB available=%sMB", $3, $4, $7}')"
          sleep 10
        done > /tmp/memlog.txt &
        echo $! > /tmp/memmon.pid

    - name: Verify execution cache
      run: python3 scripts/verify-execute-cache.py

    - name: Verify cache in build job
      run: |
        echo "Cache files: $(ls _build/execute/ 2>/dev/null | wc -l)"
        python3 scripts/verify-execute-cache.py

    - name: Build the book
      timeout-minutes: 45
      run: |
        # MyST hangs at process.exit(0) at the end of buildHtml (kernel stays
        # alive). Strategy: wait for the post-fetch cleanup to finish, signaled
        # by _build/html/build/_assets/ existing AND the asset-folder rewrite
        # having replaced /myst_assets_folder/ with /BASE_URL/build/. Once
        # those are true, the only remaining MyST step is process.exit(0), so
        # killing is safe. As a backstop, also kill if HTML files have been
        # stable for a long time but cleanup still hasn't appeared (means MyST
        # hung earlier than expected).
        stdbuf -oL -eL jupyter-book build --execute --execute-parallel 1 --max-size-webp 0 --html > /tmp/html-build.log 2>&1 &
        BUILD_PID=$!
        tail -n +1 -f /tmp/html-build.log &
        TAIL_PID=$!
        LAST_COUNT=0
        STABLE_SINCE=0
        while kill -0 $BUILD_PID 2>/dev/null; do
          COUNT=$(find _build/html -name "*.html" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq "$LAST_COUNT" ]; then
            STABLE_SINCE=$((STABLE_SINCE + 1))
          else
            STABLE_SINCE=0
            LAST_COUNT=$COUNT
          fi
          # Primary signal: post-fetch cleanup finished. Assets dir exists AND
          # the rewrite has happened (no literal placeholder left in index.html).
          ASSETS_READY=0
          if [ -d _build/html/build/_assets ] && \
             [ -f _build/html/index.html ] && \
             ! grep -q "/myst_assets_folder/" _build/html/index.html 2>/dev/null; then
            ASSETS_READY=1
          fi
          if [ "$ASSETS_READY" -eq 1 ] && [ "$STABLE_SINCE" -ge 5 ]; then
            echo "Cleanup complete (assets copied, paths rewritten). Killing hung exit."
            pkill -9 -f "ipykernel" 2>/dev/null || true
            pkill -9 -f "jupyter" 2>/dev/null || true
            for j in $(seq 1 15); do
              if ! kill -0 $BUILD_PID 2>/dev/null; then break; fi
              sleep 1
            done
            if kill -0 $BUILD_PID 2>/dev/null; then
              kill -9 $BUILD_PID 2>/dev/null || true
            fi
            break
          fi
          # Backstop: if HTML count has been stable for a long time but cleanup
          # never appeared, MyST hung before the asset-copy step. Bail anyway
          # so we surface the failure rather than waiting for the 45-min job
          # timeout.
          if [ "$STABLE_SINCE" -ge 600 ] && [ "$COUNT" -ge 50 ]; then
            echo "No new HTML for 600s and cleanup never ran. Killing."
            pkill -9 -f "ipykernel" 2>/dev/null || true
            pkill -9 -f "jupyter" 2>/dev/null || true
            for j in $(seq 1 15); do
              if ! kill -0 $BUILD_PID 2>/dev/null; then break; fi
              sleep 1
            done
            if kill -0 $BUILD_PID 2>/dev/null; then
              kill -9 $BUILD_PID 2>/dev/null || true
            fi
            break
          fi
          sleep 1
        done
        wait $BUILD_PID 2>/dev/null || true
        # Give tail a moment to flush remaining lines, then stop it.
        sleep 1
        kill $TAIL_PID 2>/dev/null || true
        exit 0

    # Self-heal if mystmd crashed during the post-fetch copy steps.
    # mystmd's buildHtml ends with two copySync calls:
    #   1. theme/public/        -> _build/html/        (Remix bundle, theme css, favicon, _assets/, _shared/)
    #   2. <session>/_build/site/public/ -> _build/html/build/ (per-page figures, PDFs, ipynbs)
    # In jupyter-book 2.1.5 the dev-server stop is awaited, so the Remix dev
    # cleanup runs first and ENOENTs the source files; the second copy then
    # never happens either. Symptom: _build/html/index.html still contains
    # /myst_assets_folder/ placeholders. Self-heal redoes both copies from
    # the snapshot + the still-on-disk site/public, then rewrites the URLs.
    # Fails loudly if the output is still broken.
    - name: Verify HTML output and self-heal if needed
      run: |
        set -e
        if [ ! -f _build/html/index.html ]; then
          echo "::error::No _build/html/index.html was produced"
          ls -la _build/html/ 2>/dev/null || true
          exit 1
        fi

        if grep -q "/myst_assets_folder/" _build/html/index.html; then
          echo "::warning::mystmd did not finish the post-fetch copy + URL-rewrite step; running fallback"

          # 1. Theme bundle: replay copySync(theme/public, _build/html).
          # `cp -rn` keeps anything mystmd already wrote (favicon.ico,
          # myst-theme.css, etc.) and only fills in the missing pieces.
          if [ -d /tmp/theme-public-snapshot ]; then
            cp -rn /tmp/theme-public-snapshot/. _build/html/ 2>/dev/null || true
            echo "Theme bundle restored. _build/html/build now has: $(find _build/html/build -mindepth 1 -maxdepth 1 -printf '%f ')"
          else
            echo "::error::No theme public snapshot available to restore from"
            exit 1
          fi

          # 2. Per-page generated assets: replay copySync(session.publicPath(), _build/html/build).
          # session.publicPath() is <workspace>/_build/site/public — populated
          # by mystmd's project-build phase and still on disk after the crash.
          if [ -d _build/site/public ]; then
            cp -rn _build/site/public/. _build/html/build/ 2>/dev/null || true
            echo "Per-page assets restored. Files in _build/html/build: $(find _build/html/build -type f | wc -l)"
          else
            echo "::warning::_build/site/public/ not found; figures and per-page exports may be missing"
          fi

          # 3. Rewrite the placeholder URLs in all text-format outputs.
          # BASE_URL is /<repo-name> (e.g. /MATH551). Use # as the sed
          # delimiter so a leading slash in BASE_URL is fine.
          REPLACEMENT="${BASE_URL}/build/"
          echo "Rewriting /myst_assets_folder/ -> ${REPLACEMENT}"
          find _build/html -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' -o -name '*.xml' \) \
            -exec sed -i "s#/myst_assets_folder/#${REPLACEMENT}#g" {} +

          echo "Fallback complete."
        else
          echo "mystmd completed cleanly; no fallback needed."
        fi

        # Final verification: no file should still contain the placeholder.
        REMAINING=$(grep -rl "/myst_assets_folder/" _build/html 2>/dev/null | head -5 || true)
        if [ -n "$REMAINING" ]; then
          echo "::error::Placeholder /myst_assets_folder/ still present after fallback in:"
          echo "$REMAINING"
          exit 1
        fi
        echo "Verified: no /myst_assets_folder/ placeholders remain."
        echo "Total files in _build/html/build: $(find _build/html/build -type f 2>/dev/null | wc -l)"

    - name: Stop memory monitor and print log
      if: always()
      run: |
        kill $(cat /tmp/memmon.pid 2>/dev/null) 2>/dev/null || true
        echo "=== Memory usage over time ==="
        cat /tmp/memlog.txt 2>/dev/null || echo "No memory log found"
        echo ""
        echo "=== Final memory state ==="
        free -h

    - name: Upload memory log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: memory-log
        path: /tmp/memlog.txt
        retention-days: 3
        if-no-files-found: ignore

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './_build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
