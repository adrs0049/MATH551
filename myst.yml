# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  plugins:
    - latex-handlers.mjs
  settings:
    output_matplotlib_strings: remove  # Clean up matplotlib output strings
  jupyter:
    binder:
      url: https://mybinder.org
      repo: adrs0049/MATH551
      ref: main
  binder: https://mybinder.org/v2/gh/adrs0049/MATH551/main
  title: Introduction to Scientific Computing
  description: Lecture notes for MATH 551 - A first course in numerical analysis
  authors:
    - name: Andreas Buttenschoen
      email: andreas.buttenschoen@umass.edu
      affiliations:
        - University of Massachusetts Amherst
  copyright: "2025"
  license: CC-BY-NC-SA-4.0
  github: https://github.com/adrs0049/MATH551
  bibliography:
    - references.bib
  # Full book PDF export disabled - per-chapter PDFs are preferred
  downloads: []
  abbreviations:
    FD: Finite Difference
    LU: Lower-Upper (decomposition)
    QR: Orthogonal-Triangular (factorization)
    ODE: Ordinary Differential Equation
    PDE: Partial Differential Equation
    SPD: Symmetric Positive Definite
  toc:
    - file: index.md
    - file: schedule.md
      title: Course Schedule
    - file: core-concepts.md
      title: Core Concepts
    # PART I: LOCAL APPROXIMATION
    - file: approximation-theory/index.md
      title: Local Approximation
      children:
        - file: approximation-theory/taylor.md
          title: "§1 Taylor's Theorem"
        - file: approximation-theory/numerical-differentiation.md
          title: "§2 Numerical Differentiation"
        - file: approximation-theory/numerical-integration.md
          title: "§3 Numerical Integration"
        - file: approximation-theory/exercises.md
          title: Exercises
    - file: error-stability/index.md
      title: Floating Point and Error Analysis
      children:
        - file: error-stability/floating-point.md
          title: "§1 Floating-Point Arithmetic"
        - file: error-stability/condition-numbers.md
          title: "§2 Condition Numbers"
        - file: error-stability/stability.md
          title: "§3 Stable and Unstable Algorithms"
        - file: error-stability/fast-inverse-sqrt.md
          title: "§4 Fast Inverse Square Root"
        - file: error-stability/exercises.md
          title: Exercises
    # PART II: ODES
    - file: odes/index.md
      title: Numerical Methods for ODEs
      children:
        - file: odes/forward-euler.md
          title: "§1 Forward Euler"
        - file: odes/backward-euler.md
          title: "§2 Backward Euler"
        - file: odes/runge-kutta.md
          title: "§3 Runge–Kutta and Adaptive Stepping"
        - file: odes/euler_maruyama.md
          title: "§4 Euler–Maruyama"
        # - file: odes/stability.md             # NOT IN SCHEDULE
    # PART III: NONLINEAR EQUATIONS
    - file: nonlinear-equations/index.md
      title: Nonlinear Equations
      children:
        - file: nonlinear-equations/bisection.md
          title: "§1 Bisection"
        - file: nonlinear-equations/fixed-point.md
          title: "§2 Fixed-Point Iteration"
        - file: nonlinear-equations/newton.md
          title: "§3 Newton's Method"
        - file: nonlinear-equations/practical-root-finding.md
          title: "§4 Practical Root Finding"
        - file: nonlinear-equations/error-analysis.md
          title: "§5 Error Analysis"
        - file: nonlinear-equations/exercises.md
          title: Exercises
    # PART IV: LINEAR ALGEBRA
    - file: qr-least-squares/index.md
      title: Linear Algebra and QR Factorization
      children:
        - file: qr-least-squares/linear-algebra-fundamentals.md
          title: "§1 Norms and Conditioning"
        - file: qr-least-squares/orthogonality.md
          title: "§2 Orthogonality and Projections"
        - file: direct-methods/triangular.md
          title: "§3 Triangular Systems"
        - file: qr-least-squares/condition-stability.md
          title: "§4 Stability in Linear Systems"
        - file: qr-least-squares/gram-schmidt.md
          title: "§5 Gram–Schmidt"
        - file: qr-least-squares/qr-factorization.md
          title: "§6 QR Factorization"
        - file: qr-least-squares/least-squares.md
          title: "§7 Least Squares"
        # - file: qr-least-squares/givens-streaming-qr.md
        #  title: "§8 Givens Rotations and Streaming QR"
        - file: qr-least-squares/exercises.md
          title: Exercises
        # - file: qr-least-squares/iterative-methods.md
    # NONLINEAR SYSTEMS - NOT IN SCHEDULE
    - file: nonlinear-systems/index.md
      title: "Nonlinear Systems (Optional)"
      children:
        - file: nonlinear-systems/newton-systems.md
          title: "§1 Newton's Method for Systems"
        - file: nonlinear-systems/globalization.md
          title: "§2 Globalization Strategies"
        - file: nonlinear-systems/quasi-newton.md
          title: "§3 Quasi-Newton Methods"
        # - file: nonlinear-systems/constrained-optimization.md
        # - file: nonlinear-systems/exercises.md
    # PART V: APPROXIMATION THEORY (ADVANCED)
    - file: interpolation/index.md
      title: Approximation Theory
      children:
        - file: interpolation/lagrange.md
          title: "§1 Polynomial Interpolation"
        - file: interpolation/point-choice.md
          title: "§2 Where to Place the Nodes"
        - file: interpolation/regularity-and-decay.md
          title: "§3 Regularity and Coefficient Decay"
        - file: interpolation/integration.md
          title: "§4 Integration as an Inner Product"
        - file: interpolation/differentiation.md
          title: "§5 Differentiation as a Matrix"
        #- file: interpolation/roots.md
        #  title: "§6 Roots as Eigenvalues"
        - file: interpolation/spectral-bvp.md
          title: "§6 Spectral Methods for BVPs"
        - file: interpolation/adaptive-qr.md
          title: "§7 Adaptive QR"
        - file: interpolation/neural-networks.md
