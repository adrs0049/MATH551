        - file: notebooks/chebyshev-toolbox.ipynb
        - file: notebooks/ultraspherical-toolbox.ipynb
        - file: notebooks/neural-network-examples.ipynb
        # - file: notebooks/jacobi-gauss-seidel.ipynb
    # APPENDICES
    - file: direct-methods/index.md
      title: "Appendix"
      children:
        - file: direct-methods/gaussian-elimination.md
          title: "§1 Gaussian Elimination"
        - file: direct-methods/lu-decomposition.md
