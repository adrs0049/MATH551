      children:
        - file: notebooks/taylor-series.ipynb
        - file: notebooks/finite-difference-demo.ipynb
        - file: notebooks/fast-inverse-sqrt.ipynb
        - file: notebooks/euler-method.ipynb
        - file: notebooks/stiffness.ipynb
        - file: notebooks/monte-carlo.ipynb
        - file: notebooks/euler-maruyama.ipynb
        - file: notebooks/bisection-demo.ipynb
        - file: notebooks/fixed-point-iteration.ipynb
        - file: notebooks/CondNumberEst.ipynb
        - file: notebooks/condition-number-digits.ipynb
        - file: notebooks/gaussian-elimination-notebook.ipynb
        - file: notebooks/stability-ge.ipynb
        - file: notebooks/deflated-continuation.ipynb
        # Hidden for the moment, pending review:
        # - file: notebooks/fourier-dct.ipynb
        # - file: notebooks/chebyshev-differentiation.ipynb
